services:
  backend:
    build:
      context: .
      dockerfile: Containerfile
      target: backend
    ports:
      - "3001:3001"
    volumes:
      - kmatrix-data:/root/.local/share/kmatrix-toolkit
    environment:
      - RUST_LOG=info
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Containerfile
      target: frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kmatrix-data:
